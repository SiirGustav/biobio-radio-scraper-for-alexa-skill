name: Daily BioBio Radio Scrapper

on:
  schedule:
    - cron: '0 11,18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download repository
      uses: actions/checkout@v3

    - name: Setting Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Dependency install
      run: npm install

    - name: Installing Playwright browser
      run: npx playwright install chromium

    - name: Executing scraper
      run: node scraper.js

    - name: Uploading news to Github Pages
      run: |
        git config --global user.name "Alexa Scraper Bot"
        git config --global user.email "actions@github.com"
        git add feed.json
        git diff-index --quiet HEAD || git commit -m "System: News daily update"
        git push origin main